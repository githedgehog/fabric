# This rule is not used by the project fabric itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the gateway.githedgehog.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/managed-by: kustomize
  name: gateway-gatewaygroup-editor-role
rules:
- apiGroups:
  - gateway.githedgehog.com
  resources:
  - gatewaygroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.githedgehog.com
  resources:
  - gatewaygroups/status
  verbs:
  - get
