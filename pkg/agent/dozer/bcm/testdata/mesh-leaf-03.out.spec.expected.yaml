          matchCommunityLists: no-community
          matchPrefixLists: vpc-peers--vpc-03
        result: accept
      "50010":
        conditions:
          matchCommunityLists: ext-inbound--ext-bgp-01
          matchPrefixLists: import-vrf--vpc-03--ext-bgp-01
        result: accept
        setLocalPreference: 500
      "65535":
        conditions: {}
        result: reject
  ipns-ext-communities--default:
