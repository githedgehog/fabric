        result: reject
      "10":
        conditions:
          matchCommunityLists: ext-inbound--ext-bgp-01
        result: accept
        setLocalPreference: 500
      "100":
        conditions: {}
        result: reject
  ext-outbound--ext-bgp-01:
    statements:
      "10":
        conditions:
          matchPrefixLists: ipns-subnets--default
        result: accept
        setCommunities:
        - 64102:1000
