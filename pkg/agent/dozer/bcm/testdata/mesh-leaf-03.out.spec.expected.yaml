acls:
  ipns-egress--default:
    entries:
      "10":
        action: DROP
        destinationAddress: 10.0.0.0/16
      "65535":
        action: ACCEPT
  no-ipns-peering--default:
    description: Prevent VPCs to cross-talk via the external
    entries:
      "1":
        action: DROP
        destinationAddress: 10.0.0.0/16
        sourceAddress: 10.0.0.0/16
      "65535":
        action: ACCEPT
